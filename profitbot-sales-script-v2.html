obj_no_time_m: 'Сколько сейчас часов в день уходит на Kaspi? Именно это и автоматизирует ProfitBot. 15 минут на встречу сегодня — и потом экономите ежедневно.',
obj_no_time_d: 'Выберите любые 15 минут на этой неделе. Покажу конкретно ваш сценарий без воды. Если за 15 минут не увидите ценности — спасибо за время, расстанемся.',

obj_think_m: 'Часто один вопрос решает всё — может отвечу прямо сейчас? Или есть конкретное сомнение?',

obj_other_m: 'Большинство наших клиентов переходили именно от других сервисов. Главная причина — аналитика прибыли по артикулам + склад в одном окне. Сколько платите сейчас?',
obj_other_d: 'Предлагаю 15 минут на Zoom — покажу разницу живьём. Если у вас уже всё закрыто — честно скажу что нам нечего предложить.',

obj_info_m: 'Всё есть на profitbot.kz. Но лучше потрачу 15 минут и покажу живьём на вашем магазине — сразу увидите подходит или нет.',

function renderSteps(active) {
S.stage = Math.max(S.stage, active);
const bar = document.getElementById('steps-bar');
bar.innerHTML = STEPS.map((st, i) => {
const cls = i < S.stage ? 'done' : i === S.stage ? 'active' : '';
const sepDone = i < S.stage ? 'done' : '';
const sep = i < STEPS.length - 1 ? `<div class="step-sep ${sepDone}"></div>` : '';
return `<div class="step ${cls}" id="${st.id}">
<div class="sd">${i < S.stage ? '✓' : i + 1}</div>${st.label}
</div>${sep}`;
}).join('');
}
function go(screen, data={}) {
S.history.push(S.screen);
S.screen = screen;
S._lastData = data;
const main = document.getElementById('main');
const fn = SCREENS[screen];
if (!fn) return;
main.innerHTML = fn(data);
main.scrollTo({top:0,behavior:'smooth'});
updateSidebar();
if (screen === 'zoom_close') setTimeout(renderSlotPicker, 0);
if (screen === 'callback_later') setTimeout(renderCallbackPicker, 0);
}
function back() {
if (!S.history.length) return;
const prev = S.history.pop();
S.screen = prev;
const main = document.getElementById('main');
const fn = SCREENS[prev];
if (!fn) return;
main.innerHTML = fn();
main.scrollTo({top:0,behavior:'smooth'});
}

}
function renderSlotPicker() {
buildCalendar('zoom-cal', function(label) {
S.zoomTime = label;
toast('Выбрано: ' + label);
});
}
function renderCallbackPicker() {
buildCalendar('cb-cal', function(label) {
S.answers.callbackTime = label;
toast('Перезвон: ' + label);
});
}
function buildCalendar(containerId, onSelect) {
const wrap = document.getElementById(containerId);
if (!wrap) return;
const T = getLang();
const now = new Date();
const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let selectedDate = null;
let selectedTime = null;
const MONTH_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь',
'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DOW_RU = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
wrap.style.cssText = 'background:var(--bg3);border:1px solid var(--border2);border-radius:12px;overflow:hidden;user-select:none';
function render() {
wrap.innerHTML = '';
const hdr = document.createElement('div');
hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)';
const btnPrev = document.createElement('button');
btnPrev.textContent = '‹';
btnPrev.style.cssText = 'background:var(--bg4);border:1px solid var(--border2);color:var(--text2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;line-height:1;transition:var(--tr)';
btnPrev.onmouseenter = function(){ this.style.color='var(--text)'; };
btnPrev.onmouseleave = function(){ this.style.color='var(--text2)'; };
btnPrev.onclick = function() {
viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
render();
};
const monthLabel = document.createElement('div');
monthLabel.textContent = MONTH_RU[viewMonth] + ' ' + viewYear;
monthLabel.style.cssText = 'font-size:13.5px;font-weight:800;color:var(--text)';
const btnNext = document.createElement('button');
btnNext.textContent = '›';
btnNext.style.cssText = btnPrev.style.cssText;
btnNext.onmouseenter = function(){ this.style.color='var(--text)'; };
btnNext.onmouseleave = function(){ this.style.color='var(--text2)'; };
btnNext.onclick = function() {
viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
render();
};
hdr.appendChild(btnPrev);
hdr.appendChild(monthLabel);
hdr.appendChild(btnNext);
wrap.appendChild(hdr);
const grid = document.createElement('div');
grid.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:10px 12px 4px';
DOW_RU.forEach(function(d) {
const cell = document.createElement('div');
cell.textContent = d;
cell.style.cssText = 'text-align:center;font-size:10.5px;font-weight:700;color:var(--text3);padding:4px 0';
grid.appendChild(cell);
});
const firstDay = new Date(viewYear, viewMonth, 1);
let startDow = firstDay.getDay() - 1;
if (startDow < 0) startDow = 6;
for (let i = 0; i < startDow; i++) {
grid.appendChild(document.createElement('div'));
}
const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
for (let day = 1; day <= daysInMonth; day++) {
const cellDate = new Date(viewYear, viewMonth, day);
const isToday = cellDate.getTime() === today.getTime();
const isPast = cellDate < today;
const isSel = selectedDate && cellDate.getTime() === selectedDate.getTime();
const cell = document.createElement('div');
cell.textContent = day;
cell.style.cssText = 'text-align:center;padding:7px 4px;border-radius:8px;font-size:13px;font-weight:600;transition:.15s;';
if (isPast) {
cell.style.color = 'var(--text3)';
cell.style.cursor = 'default';
cell.style.opacity = '0.4';
} else if (isSel) {
cell.style.background = 'var(--green)';
cell.style.color = '#fff';
cell.style.cursor = 'pointer';
} else if (isToday) {
cell.style.background = 'var(--bg4)';
cell.style.color = 'var(--green)';
cell.style.border = '1px solid rgba(0,201,123,.4)';
cell.style.cursor = 'pointer';
} else {
cell.style.color = 'var(--text)';
cell.style.cursor = 'pointer';
cell.onmouseenter = function(){ this.style.background='var(--bg4)'; };
cell.onmouseleave = function(){ this.style.background=''; };
}
if (!isPast) {
cell.onclick = function() {
selectedDate = cellDate;
selectedTime = null;
render();
};
}
grid.appendChild(cell);
}
wrap.appendChild(grid);
if (selectedDate) {
const timeSec = document.createElement('div');
timeSec.style.cssText = 'padding:10px 12px 12px;border-top:1px solid var(--border);margin-top:6px';
const tLabel = document.createElement('div');
const dayNames2 = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const monthNames2 = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const isToday2 = selectedDate.getTime() === today.getTime();
const dateStr = isToday2 ? 'Сегодня' :
(selectedDate.getDate() === today.getDate() + 1 && selectedDate.getMonth() === today.getMonth() ? 'Завтра' :
dayNames2[selectedDate.getDay()] + ', ' + selectedDate.getDate() + ' ' + monthNames2[selectedDate.getMonth()]);
tLabel.textContent = dateStr + ' — выберите время:';
tLabel.style.cssText = 'font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px';
timeSec.appendChild(tLabel);
const tGrid = document.createElement('div');
tGrid.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px';
const nowH = now.getHours(), nowM = now.getMinutes();
let hasSlots = false;
for (let h = 10; h < 19; h++) {
for (let m = 0; m < 60; m += 30) {
if (isToday2 && (h < nowH || (h === nowH && m <= nowM))) continue;
const timeStr = (h < 10 ? '0' : '') + h + ':' + (m === 0 ? '00' : '30');
const isSel = selectedTime === timeStr;
const tbtn = document.createElement('div');
tbtn.textContent = timeStr;
tbtn.style.cssText = 'padding:6px 12px;border-radius:7px;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;' +
(isSel
? 'background:var(--green);color:#fff;border:1px solid var(--green)'
: 'background:var(--bg4);color:var(--text2);border:1px solid var(--border2)');
if (!isSel) {
tbtn.onmouseenter = function(){ this.style.borderColor='var(--green)'; this.style.color='var(--green)'; };
tbtn.onmouseleave = function(){ this.style.borderColor='var(--border2)'; this.style.color='var(--text2)'; };
}
tbtn.onclick = function() {
selectedTime = timeStr;
const fullLabel = dateStr + ' в ' + timeStr;
onSelect(fullLabel);
render();
};
tGrid.appendChild(tbtn);
hasSlots = true;
}
}
if (!hasSlots) {
const noSlots = document.createElement('div');
noSlots.textContent = T.cal_no_slots || 'На сегодня слотов нет — выберите другой день';
noSlots.style.cssText = 'font-size:12px;color:var(--text3)';
tGrid.appendChild(noSlots);
}
timeSec.appendChild(tGrid);
if (selectedTime) {
const chosen = document.createElement('div');
chosen.textContent = '✓ Выбрано: ' + dateStr + ' в ' + selectedTime;
chosen.style.cssText = 'margin-top:10px;font-size:13px;font-weight:700;color:var(--green)';
timeSec.appendChild(chosen);
}
wrap.appendChild(timeSec);
}
}
render();
}
function confirmCallback() {
const time = S.answers.callbackTime || '';
const phone = S.answers.callbackPhone || '';
if (!time) { toast('Выберите время для перезвона'); return; }
S.answers.callbackConfirmed = `${time}${phone ? ' · ' + phone : ''}`;
go('callback_confirmed');
}
function selTime(el, t) {
document.querySelectorAll('.tp').forEach(b => b.classList.remove('sel'));
el.classList.add('sel');
S.zoomTime = t;
}
function toggleTheme() {
const h = document.documentElement;
const d = h.getAttribute('data-theme') === 'dark';
h.setAttribute('data-theme', d ? 'light' : 'dark');
document.querySelector('[onclick="toggleTheme()"]').textContent = d ? '🌑' : '🌙';
}
function setLang(lang) {
S.lang = lang;
document.getElementById('lang-rus').classList.toggle('active', lang === 'rus');
document.getElementById('lang-kaz').classList.toggle('active', lang === 'kaz');
rerender();
initSidebarObj();
renderPainSidebar();
updateSidebar();
toast(lang === 'kaz' ? '\u049a\u0430\u0437\u0430\u049b \u0442\u0456\u043b\u0456 \u0442\u0430\u04a3\u0434\u0430\u043b\u0434\u044b' : '\u0412\u044b\u0431\u0440\u0430\u043d \u0440\u0443\u0441\u0441\u043a\u0438\u0439 \u044f\u0437\u044b\u043a');
}
function rerender() {
var screen = S.screen;
var main = document.getElementById('main');
var fn = SCREENS[screen];
if (!fn) return;
main.innerHTML = fn(S._lastData || {});
if (screen === 'zoom_close') setTimeout(renderSlotPicker, 0);
if (screen === 'callback_later') setTimeout(renderCallbackPicker, 0);
}
function toggleSS(hdr) {
const body = hdr.nextElementSibling;
const arr = hdr.querySelector('span:last-child');
const hidden = body.style.display === 'none';
body.style.display = hidden ? '' : 'none';
arr.textContent = hidden ? '▾' : '▸';
}
function toast(msg) {
const t = document.getElementById('toast');
t.textContent = msg;
t.classList.add('show');
setTimeout(() => t.classList.remove('show'), 1800);
}
function openModal() {
const T = getLang();
const el = Math.floor((Date.now() - S.callStart) / 1000);
const m = String(Math.floor(el/60)).padStart(2,'0');
const s = String(el%60).padStart(2,'0');
const rows = [
[T.modal_date, `${new Date().toLocaleDateString('ru')} ${new Date().toLocaleTimeString('ru')}`],
[T.modal_duration, `${m}:${s}`],
[T.modal_trade, S.answers.tradeType || '—'],
[T.modal_sku, S.answers.sku || '—'],
[T.modal_services, S.answers.usesServices || '—'],
[T.modal_demping, S.answers.demping || '—'],
[T.modal_preorder, S.answers.preorder || '—'],
[T.modal_stock, S.answers.stock || '—'],
[T.modal_profit, S.answers.profit || '—'],
[T.modal_pains, S.pains.length ? S.pains.map(k => getPains()[k].label).join('; ') : '—'],
[T.modal_zoom, S.zoomTime || 'Нет'],
[T.modal_notes, document.getElementById('notes').value || '—'],
];
document.getElementById('modal-body').innerHTML = rows.map(([l,v]) => `
<div class="srow"><div class="sl">${l}</div><div class="sv">${v}</div></div>`).join('');
document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function getSummaryText() {
const T = getLang();
const el = Math.floor((Date.now()-S.callStart)/1000);
return `ИТОГ ЗВОНКА — ProfitBot
Дата: ${new Date().toLocaleString('ru')}
${T.modal_duration}: ${String(Math.floor(el/60)).padStart(2,'0')}:${String(el%60).padStart(2,'0')}
${T.q_trade} ${S.answers.tradeType||'—'}
SKU: ${S.answers.sku||'—'}
Сервисы: ${S.answers.usesServices||'—'}
Демпинг: ${S.answers.demping||'—'}
Предзаказ: ${S.answers.preorder||'—'}
Склад: ${S.answers.stock||'—'}
Прибыль: ${S.answers.profit||'—'}
Боли: ${S.pains.map(k=>getPains()[k].label).join(', ')||'—'}
Zoom: ${S.zoomTime||'не назначен'}
Заметки: ${document.getElementById('notes').value||'—'}`;
}
function copyModal() { navigator.clipboard.writeText(getSummaryText()); toast('Итог скопирован'); }
function exportTxt() {
const b = new Blob([getSummaryText()],{type:'text/plain;charset=utf-8'});
const u = URL.createObjectURL(b);
const a = document.createElement('a');
a.href=u; a.download=`pb-call-${new Date().toISOString().slice(0,10)}.txt`;
a.click(); URL.revokeObjectURL(u);
toast('Файл скачан');
}
function resetAll() {
if (!confirm('Сбросить и начать новый звонок?')) return;
S.stage=0; S.pains=[]; S.history=[]; S.callStart=Date.now();
S.zoomTime=''; S.answers={}; S.prevObjScreen='';
renderPainSidebar();
go('greeting');
}
function startTimer() {
S.timerInterval = setInterval(() => {
const e = Math.floor((Date.now()-S.callStart)/1000);
const el = document.getElementById('timer');
el.textContent = `${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
el.className = e>900?'warn':'';
},1000);
}
document.addEventListener('keydown', e => {
if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
if (e.key==='t'||e.key==='T') toggleTheme();
if (e.key==='s'||e.key==='S') openModal();
if (e.key==='r'||e.key==='R') resetAll();
if (e.key==='n'||e.key==='N') document.getElementById('notes').focus();
if (e.key==='Escape') closeModal();
});
document.getElementById('modal').addEventListener('click', e => {
if (e.target===e.currentTarget) closeModal();
});
document.getElementById('notes').addEventListener('input', () => {
localStorage.setItem('pb_notes', document.getElementById('notes').value);
});
function initSidebarObj() {
const labels = {
expensive:'💸 Дорого', no_time:'⏰ Нет времени', think:'🤔 Подумаю',
other_service:'🔄 Есть другой', send_info:'📩 Скиньте инфо',
not_interested:'🙅 Не интересно', self_cope:'💪 Сами справимся',
bad_experience:'😤 Пробовал — не понравилось',
};
const wrap = document.createElement('div');
wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px';
Object.entries(labels).forEach(([k, label]) => {
const btn = document.createElement('button');
btn.textContent = label;
btn.style.cssText = 'font-size:11.5px;padding:5px 10px;border-radius:99px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);cursor:pointer;transition:var(--tr)';
btn.onmouseenter = () => { btn.style.borderColor='var(--amber)'; btn.style.color='var(--amber)'; };
btn.onmouseleave = () => { btn.style.borderColor=''; btn.style.color=''; };
btn.onclick = () => goObjFromSidebar(k);
wrap.appendChild(btn);
});
const body = document.getElementById('obj-sidebar-body');
if (body) body.appendChild(wrap);
}
function markBtn(btn) {
btn.disabled = true;
btn.style.opacity = '0.6';
btn.textContent = '✓ ' + btn.textContent;
}
const saved = localStorage.getItem('pb_notes');
if (saved) document.getElementById('notes').value = saved;
startTimer();
initSidebarObj();
go('greeting');
</script>
</body>
</html>
